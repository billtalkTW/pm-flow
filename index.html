<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專案管理（PM）流程架構總覽</title>
<style>
  :root{
    --bg:#0f1729; --panel:#1a2438; --panel2:#222f49; --line:#33415c;
    --text:#e6ecf5; --muted:#94a3b8;
    --c-init:#6366f1; --c-plan:#0ea5e9; --c-exec:#10b981; --c-mon:#f59e0b; --c-close:#ef4444;
    --up:#22c55e; --down:#38bdf8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;}
  header{padding:20px 26px 8px;}
  h1{margin:0 0 4px;font-size:22px;letter-spacing:.5px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:12px;line-height:1.5;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:6px;font-size:13px;align-items:center;}
  .legend .item{display:flex;align-items:center;gap:6px;}
  .dot{width:13px;height:13px;border-radius:3px;display:inline-block;}
  .legend .ar{width:24px;height:0;border-top:3px solid var(--up);display:inline-block;}
  .legend .ar.d{border-top-color:var(--down);}
  .flowbar{display:flex;align-items:center;gap:6px;padding:4px 26px 14px;flex-wrap:wrap;}
  .flowbar .step{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;color:#fff;}
  .flowbar .arrow{color:var(--muted);font-size:16px;}
  .wrap{position:relative;overflow:auto;padding:0 18px 30px;}
  table{border-collapse:separate;border-spacing:8px;min-width:980px;position:relative;z-index:2;}
  th.grp{font-size:13px;font-weight:700;color:#fff;padding:8px 6px;border-radius:8px;text-align:center;}
  td.area{font-size:13px;font-weight:700;color:var(--text);background:var(--panel2);
    border-radius:8px;padding:8px 10px;white-space:nowrap;vertical-align:middle;
    border-left:4px solid var(--line);min-width:96px;}
  td.cell{background:var(--panel);border-radius:8px;padding:8px;vertical-align:top;min-width:150px;}
  .card{position:relative;border-radius:7px;padding:7px 9px;margin:5px 0;font-size:13px;cursor:pointer;
    color:#fff;line-height:1.3;border:2px solid transparent;transition:.12s;}
  .card:hover{filter:brightness(1.13);}
  .card small{display:block;color:rgba(255,255,255,.72);font-size:11px;margin-top:2px;}
  .card.sel{outline:3px solid #fff;}
  .card.up{border-color:var(--up);}
  .card.down{border-color:var(--down);}
  .card.dim{opacity:.22;}
  #overlay{position:absolute;top:0;left:18px;z-index:1;pointer-events:none;overflow:visible;}
  .empty{height:1px;}
  /* side panel */
  #panel{position:fixed;top:0;right:0;width:330px;height:100%;background:var(--panel);
    border-left:1px solid var(--line);transform:translateX(100%);transition:.22s;overflow:auto;
    padding:16px 18px;z-index:60;box-shadow:-10px 0 30px rgba(0,0,0,.35);}
  #panel.open{transform:translateX(0);}
  #panel h2{margin:0 0 5px;font-size:19px;}
  #panel .tag{font-size:11px;padding:3px 9px;border-radius:12px;color:#fff;font-weight:600;}
  #panel .close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;}
  .sec{margin-top:16px;}
  .sec h3{margin:0 0 7px;font-size:12px;letter-spacing:1px;color:var(--muted);}
  .lk{font-size:12.5px;padding:6px 9px;border-radius:7px;margin:4px 0;background:#0f1729;border:1px solid var(--line);}
  .lk b{color:#fff;cursor:pointer;} .lk b:hover{text-decoration:underline;}
  .lk .via{color:var(--muted);}
  .lk.up{border-left:3px solid var(--up);} .lk.down{border-left:3px solid var(--down);}
  .chips{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{font-size:12px;padding:4px 8px;border-radius:6px;background:#0f1729;border:1px solid var(--line);}
  .none{color:var(--muted);font-size:12px;}
  .hint{color:var(--muted);font-size:12px;padding:0 26px 22px;line-height:1.6;}

  .chip.ck{cursor:pointer;border-color:#3b5b86;}
  .chip.ck:hover{background:#16233b;border-color:#5b82c0;}
  .chip.ck::after{content:"›";color:var(--muted);margin-left:4px;transform:rotate(90deg);display:inline-block;}
  #pop{position:fixed;display:none;z-index:80;background:#0b1322;border:1px solid var(--line);
    border-radius:10px;padding:6px;min-width:200px;max-width:320px;max-height:62vh;overflow:auto;
    box-shadow:0 12px 34px rgba(0,0,0,.55);}
  #pop .ph{font-size:11.5px;color:var(--muted);margin:6px 6px 4px;letter-spacing:.4px;}
  #pop .ph b{color:#fff;}
  .popitem{display:flex;justify-content:space-between;gap:10px;align-items:center;
    font-size:13px;padding:6px 9px;border-radius:7px;cursor:pointer;}
  .popitem:hover{background:#1a2438;}
  .popitem small{color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;white-space:nowrap;}
  .popitem .cur{background:#334155;color:#cbd5e1;font-size:10px;padding:1px 7px;border-radius:8px;}
</style>
</head>
<body>
<header>
  <h1>專案管理（PM）流程架構總覽</h1>
  <div class="sub">依「五大流程群組 × 知識領域」排列，共 51 個流程。<b>點任一流程方塊</b>即可看出它的依賴：上游（誰提供輸入）以綠框＋綠箭頭標出、下游（誰使用輸出）以藍框＋藍箭頭標出。</div>
  <div class="legend" id="legend">
    <span class="item"><span class="ar"></span>上游（輸入來源）</span>
    <span class="item"><span class="ar d"></span>下游（輸出去向）</span>
  </div>
</header>

<div class="flowbar" id="flowbar"></div>

<div class="wrap" id="wrap">
  <svg id="overlay"><defs>
    <marker id="ah-up" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--up)"/></marker>
    <marker id="ah-down" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--down)"/></marker>
  </defs></svg>
  <table id="matrix"></table>
</div>
<div class="hint">提示：面板中的<b>方法 / 輸入 / 輸出</b>若有「›」標記表示其他流程也用到，可點開查看是誰並跳轉。點空白處或按 Esc 取消選取。左→右為流程先後（起始→規劃→執行→監控→結束）；同一直行內由上而下也大致是依賴順序。</div>

<div id="panel">
  <button class="close" onclick="clearSel()">&times;</button>
  <h2 id="p-name"></h2>
  <div><span class="tag" id="p-tag"></span></div>
  <div class="sec"><h3>⬅ 上游 · 提供本流程的輸入</h3><div id="p-up"></div></div>
  <div class="sec"><h3>➡ 下游 · 使用本流程的輸出</h3><div id="p-down"></div></div>
  <div class="sec"><h3>方法 / 工具技術</h3><div class="chips" id="p-me"></div></div>
  <div class="sec"><h3>輸入</h3><div class="chips" id="p-in"></div></div>
  <div class="sec"><h3>輸出</h3><div class="chips" id="p-out"></div></div>
</div>

 {n:"關係人控制",g:"mon",a:"關係人管理",i:["關係人管理計畫","績效報告"],o:["專案計畫更新","變更要求","糾正措施"],m:["會議","溝通技術","人際關係技能","專案管理資訊系統"]},
 {n:"合約結束",g:"close",a:"採購管理",i:["合約","專案績效","可交付成果"],o:["合約檔案","最終可交付產品","服務移交"],m:["合約稽核","業主簽收"]},
];
P.forEach((p,k)=>p.idx=k);
const colorOf=k=>GROUPS.find(g=>g.key===k).color;

// edges
let edges=[];
for(const A of P)for(const B of P){ if(A===B)continue;
  const via=A.o.filter(x=>B.i.includes(x)); if(via.length) edges.push({a:A.idx,b:B.idx,via}); }
const inE={},outE={}; P.forEach(p=>{inE[p.idx]=[];outE[p.idx]=[];});
edges.forEach(e=>{inE[e.b].push(e);outE[e.a].push(e);});
const methodUsers={},artIn={},artOut={};
P.forEach(p=>{ (p.m||[]).forEach(mm=>(methodUsers[mm]=methodUsers[mm]||[]).push(p.idx));
  p.i.forEach(x=>(artIn[x]=artIn[x]||[]).push(p.idx));
  p.o.forEach(x=>(artOut[x]=artOut[x]||[]).push(p.idx)); });
function chipHTML(v,k,idx){
  let ck;
  if(k==='me') ck=(methodUsers[v]||[]).some(x=>x!==idx);
  else ck=((artIn[v]||[]).concat(artOut[v]||[])).some(x=>x!==idx);
  return ck ? "<span class='chip ck' data-k='"+k+"' data-v=\""+v+"\">"+v+"</span>"
            : "<span class='chip'>"+v+"</span>";
}
function gBadge(i){var g=GROUPS.find(x=>x.key===P[i].g);return "<small style='background:"+g.color+"'>"+g.name+"</small>";}
function itemRow(i,cur){
  return "<div class='popitem' onclick='jumpFromPop(event,"+i+")'>"+P[i].n+
    (i===cur?"<span class='cur'>目前</span>":gBadge(i))+"</div>";
}
function showMethodPop(anchor,mm){
  var cur=selected, u=methodUsers[mm]||[];
  var html="<div class='ph'>使用方法「<b>"+mm+"</b>」的流程（"+u.length+"）</div>"+u.map(i=>itemRow(i,cur)).join("");
  openPop(anchor,html);
}
function showArtifactPop(anchor,name){
  var cur=selected, outs=artOut[name]||[], ins=artIn[name]||[];
  var html="<div class='ph'>交付物「<b>"+name+"</b>」</div>";
  html+="<div class='ph'>產出此項（輸出）："+(outs.length?"":"無")+"</div>"+outs.map(i=>itemRow(i,cur)).join("");
  html+="<div class='ph'>使用此項（輸入）："+(ins.length?"":"無")+"</div>"+ins.map(i=>itemRow(i,cur)).join("");
  openPop(anchor,html);
}
function openPop(anchorEl,html){
  var pop=document.getElementById("pop");
  pop.innerHTML=html; pop.style.display="block"; pop.style.left="0px"; pop.style.top="0px";
  var r=anchorEl.getBoundingClientRect(), pw=pop.offsetWidth, ph=pop.offsetHeight;
  var x=r.left, y=r.bottom+6;
  if(x+pw>innerWidth-8) x=innerWidth-8-pw;
  if(y+ph>innerHeight-8) y=r.top-6-ph;
  pop.style.left=Math.max(8,x)+"px"; pop.style.top=Math.max(8,y)+"px";
}
function hidePop(){document.getElementById("pop").style.display="none";}
function jumpFromPop(ev,i){ev.stopPropagation();hidePop();selectNode(i);}


// flow bar
const fb=document.getElementById("flowbar");
GROUPS.forEach((g,i)=>{ fb.insertAdjacentHTML("beforeend",`<span class="step" style="background:${g.color}">${g.name}</span>`);
  if(i<GROUPS.length-1)fb.insertAdjacentHTML("beforeend",`<span class="arrow">➜</span>`); });

// matrix
const t=document.getElementById("matrix");
let head="<tr><th></th>"+GROUPS.map(g=>`<th class='grp' style='background:${g.color}'>${g.name}群組</th>`).join("")+"</tr>";
let rows="";
AREAS.forEach(area=>{
  let r=`<tr><td class='area'>${area}</td>`;
  GROUPS.forEach(g=>{
    const items=P.filter(p=>p.a===area&&p.g===g.key);
    r+= items.length? "<td class='cell'>"+items.map(p=>
      `<div class='card' id='c${p.idx}' style='background:${colorOf(p.g)}' onclick='selectNode(${p.idx},event)'>${p.n}<small>${p.o.slice(0,2).join("、")}${p.o.length>2?"…":""}</small></div>`).join("")+"</td>"
      : "<td class='cell'><div class='empty'></div></td>";
  });
  t.innerHTML+=""; rows+=r+"</tr>";
});
t.innerHTML=head+rows;

// overlay sizing
const wrap=document.getElementById("wrap"), svg=document.getElementById("overlay");
function sizeOverlay(){ svg.setAttribute("width",t.scrollWidth); svg.setAttribute("height",t.scrollHeight);
  svg.style.height=t.scrollHeight+"px"; svg.style.width=t.scrollWidth+"px"; }
window.addEventListener("load",sizeOverlay); window.addEventListener("resize",()=>{sizeOverlay();if(selected!=null)draw(selected);});
sizeOverlay();

let selected=null;
function center(idx){
  const c=document.getElementById("c"+idx).getBoundingClientRect();
  const s=svg.getBoundingClientRect();
  return {l:c.left-s.left,r:c.right-s.left,t:c.top-s.top,b:c.bottom-s.top,
          cx:(c.left+c.right)/2-s.left, cy:(c.top+c.bottom)/2-s.top};
}
function clearGfx(){ [...svg.querySelectorAll("path,text")].forEach(e=>e.remove()); }
function draw(idx){
  clearGfx();
  const N=center(idx);
  const drawArrow=(from,to,cls)=>{
    const a=center(from),b=center(to);
    // anchor on horizontal sides for left-right, else vertical
    let x1,y1,x2,y2;
    if(b.cx>=a.cx){ x1=a.r; x2=b.l; } else { x1=a.l; x2=b.r; }
    y1=a.cy; y2=b.cy;
    const dx=Math.abs(x2-x1), mx=(x1+x2)/2;
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",`M${x1},${y1} C ${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    p.setAttribute("fill","none");
    p.setAttribute("stroke",cls==="up"?"var(--up)":"var(--down)");
    p.setAttribute("stroke-width","2.2");
    p.setAttribute("marker-end",cls==="up"?"url(#ah-up)":"url(#ah-down)");
    p.setAttribute("opacity",".9");
    svg.appendChild(p);
  };
  inE[idx].forEach(e=>drawArrow(e.a,idx,"up"));
  outE[idx].forEach(e=>drawArrow(idx,e.b,"down"));
}
function selectNode(idx,ev){
  if(ev)ev.stopPropagation();
  selected=idx;
  const ups=new Set(inE[idx].map(e=>e.a)), downs=new Set(outE[idx].map(e=>e.b));
  P.forEach(p=>{
    const el=document.getElementById("c"+p.idx);
    el.classList.remove("sel","up","down","dim");
    if(p.idx===idx) el.classList.add("sel");
    else if(ups.has(p.idx)) el.classList.add("up");
    else if(downs.has(p.idx)) el.classList.add("down");
    else el.classList.add("dim");
  });
  draw(idx); openPanel(idx);
}
function clearSel(){
  selected=null; clearGfx();
  P.forEach(p=>document.getElementById("c"+p.idx).classList.remove("sel","up","down","dim"));
  document.getElementById("panel").classList.remove("open");
}
function openPanel(idx){
  const p=P[idx], g=GROUPS.find(x=>x.key===p.g);
  document.getElementById("p-name").textContent=p.n;
  const tag=document.getElementById("p-tag"); tag.textContent=g.name+"群組 · "+p.a; tag.style.background=g.color;
  document.getElementById("p-up").innerHTML = inE[idx].length? inE[idx].map(e=>
    `<div class='lk up'><b onclick='selectNode(${e.a})'>${P[e.a].n}</b> <span class='via'>→ ${e.via.join("、")}</span></div>`).join("") : "<div class='none'>無（起點流程）</div>";
  document.getElementById("p-down").innerHTML = outE[idx].length? outE[idx].map(e=>
    `<div class='lk down'><b onclick='selectNode(${e.b})'>${P[e.b].n}</b> <span class='via'>← ${e.via.join("、")}</span></div>`).join("") : "<div class='none'>無（終點交付）</div>";
  document.getElementById("p-me").innerHTML=(p.m||[]).map(x=>chipHTML(x,"me",idx)).join("");
  document.getElementById("p-in").innerHTML=p.i.map(x=>chipHTML(x,"in",idx)).join("");
  document.getElementById("p-out").innerHTML=p.o.map(x=>chipHTML(x,"out",idx)).join("");
  document.getElementById("panel").classList.add("open");
}
document.getElementById("panel").addEventListener("click",e=>{
  var c=e.target.closest(".chip.ck"); if(!c)return; e.stopPropagation();
  if(c.dataset.k==="me") showMethodPop(c,c.dataset.v); else showArtifactPop(c,c.dataset.v);
});
document.addEventListener("click",e=>{ if(!e.target.closest("#pop")&&!e.target.closest(".chip.ck")) hidePop(); });
document.body.addEventListener("click",e=>{ if(!e.target.closest(".card")&&!e.target.closest("#panel")&&!e.target.closest("#pop")) clearSel(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape")clearSel(); });
wrap.addEventListener("scroll",()=>{ if(selected!=null)draw(selected); });
</script>
<div id="pop"></div>
</body>
</html>
